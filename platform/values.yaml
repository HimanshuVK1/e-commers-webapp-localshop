mongodb:
  auth:
    enabled: false # For development prototype. Use External Secrets for Prod.
  persistence:
    size: 2Gi

redis:
  auth:
    enabled: false
  master:
    persistence:
      size: 1Gi

rabbitmq:
  auth:
    username: user
    password: password
  persistence:
    size: 2Gi

kube-prometheus-stack:
  grafana:
    enabled: true
    adminPassword: admin

loki-stack:
  loki:
    enabled: true
    isDefault: false
  promtail:
    enabled: true

argocd-image-updater:
  config:
    registries:
      - name: ECR
        api_url: https://970547369309.dkr.ecr.ap-south-1.amazonaws.com
        prefix: 970547369309.dkr.ecr.ap-south-1.amazonaws.com
        credentials: ext:/scripts/ecr-login.sh
        cred_resolve: ecr-login

external-secrets:
  installCRDs: true
  webhook:
    port: 9443
  serviceAccount:
    create: true
    name: "external-secrets"
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::970547369309:role/localshop-dev-external-secrets"
