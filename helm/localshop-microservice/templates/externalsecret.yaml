{{- if .Values.secrets }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "localshop-microservice.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "localshop-microservice.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ include "localshop-microservice.fullname" . }}
    creationPolicy: Owner
  data:
  {{- range $k, $v := .Values.secrets }}
  - secretKey: {{ $k }}
    remoteRef:
      key: {{ splitList ":" $v | first }}
      property: {{ splitList ":" $v | last }}
  {{- end }}
{{- end }}