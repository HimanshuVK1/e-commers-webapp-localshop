name: Build and Push Microservices

on:
  push:
    branches:
      - dev
    paths:
      - 'webapp/**'
  pull_request:
    branches:
      - dev
    paths:
      - 'webapp/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: 'ap-south-1'
  ECR_REGISTRY: '970547369309.dkr.ecr.ap-south-1.amazonaws.com'

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, frontend, user-service, product-service, cart-service, order-service, inventory-service, analytics-service, payment-service, notification-service]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::970547369309:role/localshop-dev-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build
        run: |
          cd webapp/${{ matrix.service }} || cd webapp/services/${{ matrix.service }} || exit 1
          REPOSITORY=${{ env.ECR_REGISTRY }}/localshop-${{ matrix.service }}
          docker build -t $REPOSITORY:${{ github.sha }} .
        
  push:
    name: Push ${{ matrix.service }}
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    strategy:
      matrix:
        service: [gateway, frontend, user-service, product-service, cart-service, order-service, inventory-service, analytics-service, payment-service, notification-service]
    
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::970547369309:role/localshop-dev-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push
        run: |
          REPOSITORY=${{ env.ECR_REGISTRY }}/localshop-${{ matrix.service }}
          docker push $REPOSITORY:${{ github.sha }}
