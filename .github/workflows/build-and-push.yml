name: Build and Push Microservices

on:
  push:
    branches: [ dev ]
    paths:
      - 'webapp/**'
  pull_request:
    branches: [ dev ]
    paths:
      - 'webapp/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: 'ap-south-1'
  ECR_REGISTRY: '970547369309.dkr.ecr.ap-south-1.amazonaws.com'

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, frontend, user-service, product-service, cart-service, order-service, inventory-service, analytics-service, payment-service, notification-service]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Build Image
        run: |
          cd webapp/${{ matrix.service }} || cd webapp/services/${{ matrix.service }}
          docker buildx build --cache-from=type=local,src=/tmp/.buildx-cache --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max -t localshop-${{ matrix.service }}:${{ github.sha }} .

      - name: Upload Artifact (Placeholder for Test Results)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-build-logs
          path: .

  push:
    name: Push to ECR
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    strategy:
      matrix:
        service: [gateway, frontend, user-service, product-service, cart-service, order-service, inventory-service, analytics-service, payment-service, notification-service]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::970547369309:role/localshop-dev-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push
        run: |
          REPOSITORY=${{ env.ECR_REGISTRY }}/localshop-${{ matrix.service }}
          docker tag localshop-${{ matrix.service }}:${{ github.sha }} $REPOSITORY:${{ github.sha }}
          docker push $REPOSITORY:${{ github.sha }}
